name: Verify manifest
on:
  pull_request:
    branches: [main]
jobs:
  verify-manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fetch main branch
        run: git fetch origin main
      - name: Verify every commit has a valid manifest
        run: |
          python agents/openclaw/karta-0/manifest.py \
            --verify-range origin/main..HEAD \
            --strict
      - name: Verify prompt log exists for each commit
        run: |
          python agents/openclaw/karta-0/manifest.py \
            --verify-logs origin/main..HEAD
      - name: Verify commits are signed by known agents
        run: |
          git config gpg.format ssh
          git config gpg.ssh.allowedSignersFile .github/allowed-signers
          for sha in $(git log --format=%H origin/main..HEAD); do
            if git verify-commit $sha 2>/dev/null; then
              echo "  $sha ✓ signature verified"
            else
              echo "  $sha ERROR: commit not signed by a known agent"
              exit 1
            fi
          done
