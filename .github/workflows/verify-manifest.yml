name: Verify manifest

on:
  pull_request:
    branches: [main]

jobs:
  verify-manifest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Need HEAD and previous commit

      - name: Verify every commit has a valid manifest
        run: |
          python agents/openclaw/manifest.py \
            --verify-range origin/main..HEAD \
            --strict

      - name: Verify prompt log exists for each commit
        run: |
          python agents/openclaw/manifest.py \
            --verify-logs origin/main..HEAD

      - name: Scan logs for secrets
        run: |
          pip install trufflehog3 --quiet
          trufflehog3 --format json logs/ \
            --rules agents/openclaw/secret_patterns.json \
            --exit-code 1 \
            || (echo "SECRET DETECTED IN LOGS — aborting" && exit 1)

      - name: Verify no human commits
        run: |
          python agents/openclaw/verify_authorship.py \
            --range origin/main..HEAD \
            --allowed-bot-accounts "${{ vars.KARTA0_BOT_ACCOUNT }},dependabot[bot]"
